---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/environment-schema.json
# NOTE: fmhfunprofiler is not available on bioconda/conda-forge.
# Use the container (ghcr.io/vdblab/fmhfunprofiler:20250930) instead.
# The conda directive in main.nf is intentionally commented out.
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - conda-forge::wget
  - conda-forge::unzip
  - conda-forge::bc
  - conda-forge::pandas
  - bioconda::sourmash
  - bioconda::biom-format
  - pip
  - pip:
      - git+https://github.com/KoslickiLab/fmh-funprofiler.git@main
